<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <style>
      .title { font: 700 28px sans-serif; fill: #1f2937; }
      .lane { font: 700 22px sans-serif; fill: #111827; }
      .label { font: 600 18px sans-serif; fill: #111827; }
      .small { font: 500 15px sans-serif; fill: #374151; }
      .warn { font: 700 16px sans-serif; fill: #9a3412; }
      .note { font: 600 16px sans-serif; fill: #1f2937; }
      .boxtext { font: 600 17px sans-serif; fill: #111827; }
      .sub { font: 500 14px sans-serif; fill: #374151; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
  </defs>

  <rect width="1500" height="900" fill="#ffffff"/>
  <text x="40" y="50" class="title">Pair Metadata Pipeline in Current ASE Runtime</text>
  <text x="40" y="82" class="small">Code basis: calculator.py -&gt; pair_runtime.prepare_pair_metadata(...)</text>

  <rect x="40" y="120" width="1420" height="220" rx="16" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="60" y="160" class="lane">CPU / Host lane</text>

  <rect x="40" y="390" width="1420" height="250" rx="16" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="60" y="430" class="lane">GPU / Device lane</text>

  <rect x="90" y="190" width="220" height="90" rx="12" fill="#ffffff" stroke="#94a3b8"/>
  <text x="115" y="225" class="boxtext">1. Graph build</text>
  <text x="115" y="248" class="sub">unlabeled_atoms_to_graph(...)</text>
  <text x="115" y="270" class="sub">edge_index, edge_vec, cell_shift</text>

  <rect x="370" y="190" width="240" height="90" rx="12" fill="#ffffff" stroke="#94a3b8"/>
  <text x="395" y="225" class="boxtext">2. Optional cache check</text>
  <text x="395" y="248" class="sub">build_topology_signature_tensor(...)</text>
  <text x="395" y="270" class="sub">uses CPU hashing bytes</text>

  <rect x="670" y="190" width="250" height="90" rx="12" fill="#fff7ed" stroke="#fdba74"/>
  <text x="695" y="225" class="boxtext">3. CPU signature path</text>
  <text x="695" y="248" class="sub">tensor -&gt; cpu -&gt; bytes -&gt; blake2b</text>
  <text x="695" y="270" class="sub">still serial host work</text>

  <rect x="980" y="190" width="240" height="90" rx="12" fill="#ffffff" stroke="#94a3b8"/>
  <text x="1005" y="225" class="boxtext">4. Cache hit?</text>
  <text x="1005" y="248" class="sub">if yes: copy pair tensors</text>
  <text x="1005" y="270" class="sub">if no: build metadata below</text>

  <line x1="310" y1="235" x2="370" y2="235" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="610" y1="235" x2="670" y2="235" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="920" y1="235" x2="980" y2="235" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="120" y="470" width="240" height="95" rx="12" fill="#ffffff" stroke="#94a3b8"/>
  <text x="145" y="505" class="boxtext">5. data.to(device)</text>
  <text x="145" y="528" class="sub">edge_index / edge_vec / cell_shift</text>
  <text x="145" y="550" class="sub">moved to CUDA tensors</text>

  <rect x="430" y="455" width="280" height="125" rx="12" fill="#ffffff" stroke="#94a3b8"/>
  <text x="455" y="490" class="boxtext">6. Pair canonicalization</text>
  <text x="455" y="513" class="sub">forward=(dst,src,shift)</text>
  <text x="455" y="535" class="sub">reverse=(src,dst,-shift)</text>
  <text x="455" y="557" class="sub">choose canonical by lexicographic compare</text>

  <rect x="770" y="455" width="260" height="125" rx="12" fill="#ffffff" stroke="#94a3b8"/>
  <text x="795" y="490" class="boxtext">7. Vectorized pair build</text>
  <text x="795" y="513" class="sub">torch.unique(..., return_inverse=True)</text>
  <text x="795" y="535" class="sub">scatter_reduce amin for forward/backward</text>
  <text x="795" y="557" class="sub">build pair map + reverse flags</text>

  <rect x="1090" y="455" width="270" height="125" rx="12" fill="#ffffff" stroke="#94a3b8"/>
  <text x="1115" y="490" class="boxtext">8. Pair tensors materialized</text>
  <text x="1115" y="513" class="sub">EDGE_PAIR_MAP</text>
  <text x="1115" y="535" class="sub">PAIR_EDGE_FORWARD/BACKWARD_INDEX</text>
  <text x="1115" y="557" class="sub">PAIR_EDGE_VEC = index_select(...)</text>

  <line x1="360" y1="518" x2="430" y2="518" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="710" y1="518" x2="770" y2="518" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1030" y1="518" x2="1090" y2="518" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="1090" y1="280" x2="1090" y2="455" stroke="#ea580c" stroke-width="3" stroke-dasharray="10 8" marker-end="url(#arrow)"/>
  <text x="1110" y="370" class="warn">cache miss -&gt; GPU pair build</text>

  <line x1="1120" y1="280" x2="1240" y2="455" stroke="#6b7280" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="1180" y="360" class="small">cache hit -&gt; copy cached tensors</text>

  <rect x="70" y="690" width="1360" height="150" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="95" y="725" class="note">Concurrency interpretation</text>
  <text x="95" y="755" class="small">- Pair canonicalization itself is now vectorized and can run on device.</text>
  <text x="95" y="780" class="small">- Topology signature still uses CPU hashing, so the path is not fully device-only.</text>
  <text x="95" y="805" class="small">- There is no explicit torch.cuda.Stream / wait_stream / record_stream usage in this runtime path.</text>
  <text x="95" y="830" class="small">- In practice, pair metadata and the following model forward are effectively serialized on the default stream.</text>
</svg>
